databases:
  - name: tycheprime-agent-db
    plan: free

services:
  - type: web
    name: tycheprime-agent-cache
    runtime: node
    rootDir: app
    plan: free
    buildCommand: npm install
    startCommand: node server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: tycheprime-agent-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://tycheprime-functionspace.onrender.com,https://fs-trading-sdk.onrender.com,http://localhost:3000"
      - key: EXA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_API_SECRET
        sync: false
      - key: FS_ENGINE_API_URL
        value: "https://fs-engine-api.onrender.com"

  - type: web
    name: tycheprime-agent
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build -w app
    staticPublishPath: app/dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_FS_BASE_URL
        value: "/fs-api"
      - key: VITE_AGENT_CACHE_URL
        fromService:
          type: web
          name: tycheprime-agent-cache
          property: host
      - key: VITE_AGENT_API_SECRET
        sync: false
    routes:
      - type: rewrite
        source: /fs-api/*
        destination: https://tycheprime-agent-cache.onrender.com/fs-api/*
      - type: rewrite
        source: /exa/*
        destination: https://tycheprime-agent-cache.onrender.com/exa/*
      - type: rewrite
        source: /claude/*
        destination: https://tycheprime-agent-cache.onrender.com/claude/*
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: functionspace-docs
    runtime: static
    buildCommand: npm install && cd packages/docs && npm run build
    staticPublishPath: packages/docs/build
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FS_BASE_URL
        value: "https://fs-engine-api.onrender.com"
    headers:
      - path: /llms.txt
        name: Content-Type
        value: text/plain
      - path: /core.txt
        name: Content-Type
        value: text/plain
      - path: /react.txt
        name: Content-Type
        value: text/plain
      - path: /ui.txt
        name: Content-Type
        value: text/plain
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
