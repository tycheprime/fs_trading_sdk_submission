services:
  - type: web
    name: oracle-agent
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build -w app
    staticPublishPath: app/dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_FS_BASE_URL
        value: "https://fs-engine-api.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: functionspace-docs
    runtime: static
    buildCommand: npm install && cd packages/docs && npm run build
    staticPublishPath: packages/docs/build
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FS_BASE_URL
        value: "https://fs-engine-api.onrender.com"
    headers:
      - path: /llms.txt
        name: Content-Type
        value: text/plain
      - path: /core.txt
        name: Content-Type
        value: text/plain
      - path: /react.txt
        name: Content-Type
        value: text/plain
      - path: /ui.txt
        name: Content-Type
        value: text/plain
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
